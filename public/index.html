<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AAR Reconciliation</title>
    <style>
      :root {
        --bg: #0f1115; --panel: #171a21; --ink: #e7e9ee; --muted: #9aa3b2;
        --line: #2a2f3a; --accent: #6ea8fe;
        --aligned: #34d399; --partial: #fbbf24; --contradicted: #f87171; --insufficient: #a78bfa;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--ink);
        font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      header { padding: 24px 20px 8px; max-width: 1100px; margin: 0 auto; }
      h1 { font-size: 20px; margin: 0 0 4px; }
      header p { margin: 0; color: var(--muted); }
      main { max-width: 1100px; margin: 0 auto; padding: 16px 20px 60px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
      label { display: block; font-weight: 600; margin: 0 0 6px; }
      label span { font-weight: 400; color: var(--muted); }
      textarea {
        width: 100%; min-height: 240px; resize: vertical; background: var(--panel);
        color: var(--ink); border: 1px solid var(--line); border-radius: 8px;
        padding: 12px; font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .actions { margin: 16px 0; display: flex; gap: 12px; align-items: center; }
      button {
        background: var(--accent); color: #07101f; border: 0; border-radius: 8px;
        padding: 10px 18px; font-weight: 700; cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .hint { color: var(--muted); font-size: 13px; }
      .status {
        display: inline-block; padding: 4px 12px; border-radius: 999px;
        font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; font-size: 12px;
      }
      .status.aligned { background: rgba(52,211,153,.15); color: var(--aligned); }
      .status.partial { background: rgba(251,191,36,.15); color: var(--partial); }
      .status.contradicted { background: rgba(248,113,113,.15); color: var(--contradicted); }
      .status.insufficient_trace { background: rgba(167,139,250,.15); color: var(--insufficient); }
      #out { margin-top: 20px; }
      pre {
        background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
        padding: 14px; overflow: auto; font: 12.5px/1.5 ui-monospace, Menlo, monospace;
      }
      .summary { margin: 10px 0 0; color: var(--muted); }
      .err { color: var(--contradicted); }
    </style>
  </head>
  <body>
    <header>
      <h1>Agent AAR Reconciliation</h1>
      <p>Does the account of the run match the run? Paste an AAR and a trace.</p>
    </header>
    <main>
      <div class="grid">
        <div>
          <label>Testimony <span>(AAR markdown)</span></label>
          <textarea id="testimony"></textarea>
        </div>
        <div>
          <label>Trace <span>(JSON array or JSONL)</span></label>
          <textarea id="trace"></textarea>
        </div>
      </div>
      <div class="actions">
        <button id="run">Reconcile</button>
        <span class="hint">POSTs to <code>/api/reconcile</code> — the same core as the CLI and MCP server.</span>
      </div>
      <div id="out"></div>
    </main>

    <script>
      // Prefilled with the "contradiction" example so the page works on first load.
      const SAMPLE_TESTIMONY = `# After-Action Report — Pitcher W/L Decision Fix

## The ask

Stop crediting every pitcher with a win or loss in the box score.

## The fix

- Changed \`o27v2/web/box_text.py\` to read the per-game decision instead of
  season totals.

## What I did not change

- Left \`o27v2/web/app.py\` untouched; the bug was entirely in the text builder.
- Did not touch the database schema.
`;
      const SAMPLE_TRACE = [
        '{"id":"ev-1","run_id":"run-contra","actor":"agent","kind":"prompt","summary":"Stop crediting every pitcher with a win or loss"}',
        '{"id":"ev-2","run_id":"run-contra","actor":"agent","kind":"file_write","summary":"read per-game decision instead of season totals","target":"o27v2/web/box_text.py"}',
        '{"id":"ev-3","run_id":"run-contra","actor":"agent","kind":"file_write","summary":"adjust decision map wiring in game_detail","target":"o27v2/web/app.py"}',
      ].join("\n");

      const $ = (id) => document.getElementById(id);
      $("testimony").value = SAMPLE_TESTIMONY;
      $("trace").value = SAMPLE_TRACE;

      async function run() {
        const btn = $("run");
        const out = $("out");
        btn.disabled = true;
        out.innerHTML = '<p class="hint">Reconciling…</p>';
        try {
          const resp = await fetch("/api/reconcile", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ testimony: $("testimony").value, trace: $("trace").value }),
          });
          const diff = await resp.json();
          if (!resp.ok) {
            out.innerHTML = '<p class="err">' + (diff.error || resp.statusText) + "</p>";
            return;
          }
          const st = diff.status || "";
          out.innerHTML =
            '<span class="status ' + st + '">' + st.replace("_", " ") + "</span>" +
            '<p class="summary">' + (diff.summary || "") + "</p>" +
            "<pre>" + escapeHtml(JSON.stringify(diff, null, 2)) + "</pre>";
        } catch (e) {
          out.innerHTML = '<p class="err">' + String(e) + "</p>";
        } finally {
          btn.disabled = false;
        }
      }
      function escapeHtml(s) {
        return s.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      }
      $("run").addEventListener("click", run);
    </script>
  </body>
</html>
