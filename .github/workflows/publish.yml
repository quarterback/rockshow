name: Publish to npm

# Publishes closedtab to npm via npm Trusted Publishing (OIDC) — no tokens.
# Triggered by publishing a GitHub Release (bump the version first), or manually.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; runners ship older.
      - run: npm install -g npm@latest

      - run: npm ci

      # prepublishOnly runs clean + build + test; OIDC provides auth & provenance.
      - run: npm publish
